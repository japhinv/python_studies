<!DOCTYPE html>
<html>
<head>
    <title>Leave Result</title>
</head>
<body>
    <h2>Leave Application Result</h2>

    <p><b>Name:</b> {{ name }}</p>
    <p><b>Register No:</b> {{ reg_no }}</p>
    <p><b>Reason:</b> {{ reason }}</p>
    <p><b>Days Requested:</b> {{ days }}</p>

    <h3>Status: {{ status }}</h3>
    <p>{{ message }}</p>

    <a href="/">Apply Another Leave</a>
</body>
</html>
