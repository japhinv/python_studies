{% extends "base.html" %}
{% block content %}

<h3>Attendance Report</h3>

<table class="table table-bordered">
    <tr>
        <th>Student ID</th>
        <th>Date</th>
        <th>Status</th>
    </tr>

    {% for r in records %}
    <tr>
        <td>{{ r.student_id }}</td>
        <td>{{ r.date }}</td>
        <td>{{ r.status }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
