<!DOCTYPE html>
<html>
<head>
    <title>Student Leave Request</title>
</head>
<body>
    <h2>Student Leave Request Form</h2>

    <form method="POST" action="/apply">
        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Register Number:</label><br>
        <input type="text" name="reg_no" required><br><br>

        <label>Reason:</label><br>
        <input type="text" name="reason" required><br><br>

        <label>Number of Leave Days:</label><br>
        <input type="number" name="days" required><br><br>

        <button type="submit">Apply Leave</button>
    </form>
</body>
</html>
