{% extends "base.html" %}
{% block content %}

<h3>Add Student</h3>

<form method="POST">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Roll Number</label>
        <input type="text" name="roll" class="form-control" required>
    </div>

    <button class="btn btn-primary">Add Student</button>
</form>

{% endblock %}
