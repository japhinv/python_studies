{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="row">

  <!-- Total Students -->
  <div class="col-md-4">
    <div class="alert alert-success text-center">
      <h5>Total Students</h5>
      <h2>{{ total_students }}</h2>
    </div>
  </div>

  <!-- Present Today -->
  <div class="col-md-4">
    <div class="alert alert-primary text-center">
      <h5>Present Today</h5>
      <h2>{{ present_today }}</h2>
    </div>
  </div>

  <!-- Absent Today -->
  <div class="col-md-4">
    <div class="alert alert-danger text-center">
      <h5>Absent Today</h5>
      <h2>{{ absent_today }}</h2>
    </div>
  </div>

</div>

<hr>

<a href="/add_student" class="btn btn-primary">➕ Add Student</a>
<a href="/mark_attendance" class="btn btn-success">📝 Mark Attendance</a>
<a href="/report" class="btn btn-secondary">📄 View Report</a>

{% endblock %}
